<!-- Skip link — navigazione rapida da tastiera/screen reader -->
<a href="#catalogo" class="skip-link">Vai al catalogo</a>

<!-- ══ Header ═══════════════════════════════════════════════════════ -->
<header class="shell-header" role="banner">
  <div class="header-inner">

    <div class="header-brand">
      <span class="header-wordmark">AutoGalleria</span>
      <span class="header-divider" aria-hidden="true"></span>
      <span class="header-tagline">Gestione Catalogo</span>
    </div>

    <div class="header-badge">
      <span class="badge-indicator" aria-hidden="true"></span>
      <span class="badge-label">Portale Interno</span>
    </div>

  </div>
  <!-- Riga decorativa: rosso breve a sinistra, bordo lungo a destra -->
  <div class="header-accent-rule" aria-hidden="true"></div>
</header>

<!-- ══ Main — griglia a due colonne ════════════════════════════════ -->
<main class="shell-main" id="catalogo" role="main">

  <section
    class="panel-catalog"
    aria-label="Catalogo vetture disponibili"
  >
    <app-product-list-component></app-product-list-component>
  </section>

  <aside
    class="panel-detail"
    aria-label="Scheda di dettaglio della vettura selezionata"
  >
    <app-product-detail-component></app-product-detail-component>
  </aside>

</main>

<!-- ══ Footer ══════════════════════════════════════════════════════ -->
<footer class="shell-footer" role="contentinfo">
  <div class="footer-inner">
    <small class="footer-copy">
      &copy; 2026 AutoGalleria &mdash; Portale interno di gestione. Tutti i diritti riservati.
    </small>
  </div>
</footer>
