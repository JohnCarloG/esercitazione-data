<section class="catalog">
  <h2 class="catalog-title">Catalogo Auto</h2>

  <!-- ── Modale aggiunta auto ──────────────────────────────────── -->
  <div
    class="modal-overlay"
    *ngIf="isFormModalOpen"
    (click)="closeFormModal()"
  >
    <div
      class="modal-panel"
      role="dialog"
      aria-modal="true"
      aria-label="Aggiungi una nuova auto al catalogo"
      (click)="$event.stopPropagation()"
      (keydown)="trapFocus($event)"
      #modalPanel
    >
      <button
        class="modal-close-btn"
        type="button"
        (click)="closeFormModal()"
        aria-label="Chiudi il modulo di aggiunta auto"
        #modalCloseBtn
      >
        <lucide-angular [img]="xIcon" [size]="16" color="currentColor" aria-hidden="true"></lucide-angular>
      </button>
      <app-product-form (productCreated)="addProduct($event)"></app-product-form>
    </div>
  </div>

  <!-- ── Griglia schede auto ───────────────────────────────────── -->
  <div class="card-grid">
    <article
      *ngFor="let product of products; let i = index; trackBy: trackByIndex"
      class="card"
      [class.selected]="selectedProduct === product"
      (click)="onProductClick(product)"
      (keydown.enter)="onProductClick(product)"
      (keydown.space)="onProductClick(product); $event.preventDefault()"
      tabindex="0"
      role="button"
      [attr.aria-current]="selectedProduct === product ? 'true' : null"
      [attr.aria-label]="product.brand + ' ' + product.name + ' — €' + product.price"
    >
      <div class="card-img-wrap">
        <img
          class="card-img"
          [src]="product.imageUrl"
          [alt]="product.name"
          (error)="onImageError($event)"
          loading="lazy"
        />
        <span class="card-year" aria-hidden="true">{{ product.year }}</span>
      </div>

      <div class="card-body">
        <p class="card-brand">{{ product.brand }}</p>
        <h3 class="card-name">{{ product.name }}</h3>

        <div class="card-tags" role="group" aria-label="Specifiche rapide">
          <span class="tag">{{ product.fuelType }}</span>
          <span class="tag">{{ product.horsepower }}&nbsp;CV</span>
        </div>

        <p class="card-desc">{{ product.description }}</p>

        <div class="card-bottom">
          <p class="card-price">€&nbsp;{{ product.price | number }}</p>
          <button
            type="button"
            class="btn-remove"
            (click)="deleteProduct(i); $event.stopPropagation()"
            [attr.aria-label]="'Elimina ' + product.name + ' dal catalogo'"
          >
            Elimina
          </button>
        </div>
      </div>
    </article>
  </div>

  <!-- ── Stato vuoto catalogo ──────────────────────────────────── -->
  <div *ngIf="products.length === 0" class="empty-state" role="status">
    <lucide-angular [img]="inboxIcon" [size]="48" color="currentColor" class="empty-icon" aria-hidden="true"></lucide-angular>
    <p class="empty-title">Nessuna vettura in catalogo</p>
    <p class="empty-hint">Aggiungi la prima auto per iniziare a popolare il catalogo.</p>
  </div>
</section>
